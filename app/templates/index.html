<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Owkin Agent POC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/chat.js" defer></script>
    <style>
      .pill {
        display: inline-block;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.75rem;
        background: #f3f4f6;
        color: #374151;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
        border: 1px solid #e5e7eb;
        margin: 0.125rem 0.25rem 0.125rem 0;
      }
      .pill.result {
        background: #ecfdf5;
        color: #065f46;
        border-color: #a7f3d0;
      }
      .bubble {
        white-space: pre-wrap;
        word-wrap: break-word;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <header class="border-b bg-white">
      <div class="max-w-3xl mx-auto px-4 py-4">
        <h1 class="text-lg font-semibold">Owkin Agent POC</h1>
        <p class="text-sm text-slate-500">
          Ask about genes and median expression values across cancer indications.
        </p>
      </div>
    </header>

    <main class="flex-1 max-w-3xl w-full mx-auto px-4 py-6 flex flex-col gap-4">
      <div
        id="chat"
        class="flex-1 flex flex-col gap-4 overflow-y-auto pb-4"
        style="min-height: 50vh"
      ></div>

      <form id="form" class="flex gap-2 sticky bottom-4 bg-slate-50 pt-2">
        <input
          id="input"
          type="text"
          class="flex-1 rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="e.g. What is the median expression of genes involved in breast cancer?"
          autocomplete="off"
        />
        <button
          id="send"
          type="submit"
          class="rounded-lg bg-indigo-600 text-white px-4 py-2 font-medium hover:bg-indigo-700 disabled:opacity-50"
        >
          Send
        </button>
      </form>

      <div class="text-xs text-slate-400">
        Try:
        <button class="suggest underline" data-q="How can you help me?">How can you help me?</button>
        ·
        <button class="suggest underline" data-q="What are the main genes involved in lung cancer?">main genes in lung cancer</button>
        ·
        <button class="suggest underline" data-q="What is the median value expression of genes involved in breast cancer?">median expression for breast cancer</button>
        ·
        <button class="suggest underline" data-q="What is the median value expression of genes involved in esophageal cancer?">median expression for esophageal cancer</button>
      </div>
    </main>
  </body>
</html>
